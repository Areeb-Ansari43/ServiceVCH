<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Details - VCH Fleet Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body onload="checkAuth(); loadVehicleDetail()">

<div class="app-container">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23f7791f' width='100' height='100'/%3E%3Ctext x='50' y='60' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EVH%3C/text%3E%3C/svg%3E" alt="VCH">
      <div class="sidebar-brand-text">
        <strong>VCH Fleet</strong>
        <small>Tracker</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard.html')">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </div>
      <div class="nav-item active" id="nav-vehicles" onclick="navigate('vehicles.html')">
        <i class="fa-solid fa-car"></i> Vehicles
      </div>
      <div class="nav-item" id="nav-services" onclick="navigate('services.html')">
        <i class="fa-solid fa-wrench"></i> Service History
      </div>
      <div class="nav-item" id="nav-mileage" onclick="navigate('mileage.html')">
        <i class="fa-solid fa-gauge"></i> Driver Mileage
      </div>
      <div class="nav-divider"></div>
      <div class="nav-item add-vehicle" id="nav-add-vehicle" onclick="navigate('add-vehicle.html')">
        <i class="fa-solid fa-plus"></i> Add Vehicle
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sign-out-btn" onclick="signOut()">
        <i class="fa-solid fa-sign-out-alt"></i> Sign Out
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="page">
      <div id="vehicle-detail-content"></div>
    </div>
  </main>
</div>

<!-- ===== DELETE CONFIRM MODAL ===== -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3><i class="fa-solid fa-trash" style="color:#f87171;margin-right:8px"></i> Delete</h3>
    <p id="delete-modal-text">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger btn-sm" id="delete-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check toast-icon"></i>
  <span id="toast-text">Action completed</span>
</div>

<script src="assets/app.js"></script>
<script>
function loadVehicleDetail() {
  const params = new URLSearchParams(window.location.search);
  const vehicleId = params.get('id');
  const v = VEHICLES[vehicleId];
  
  if (!v) {
    document.getElementById('vehicle-detail-content').innerHTML = '<div class="empty-state"><i class="fa-solid fa-car"></i><h3>Vehicle not found</h3></div>';
    return;
  }

  const statusClass = v.status === 'active' ? 'active' : v.status === 'in-service' ? 'in-service' : 'off-road';
  const totalCost = v.services.filter(s => s.cost !== '—').reduce((a, s) => a + parseInt(s.cost.replace('£', '') || 0), 0);
  
  let servicesHTML = v.services.map((s, idx) => `
    <div style="display: flex; justify-content: space-between; align-items: start; padding: 12px 0; border-bottom: 1px solid var(--line);">
      <div style="flex: 1;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
          <span class="type-badge ${s.type}" style="font-size: 10px;"><i class="fa-solid ${TYPE_ICONS[s.type] || 'fa-wrench'}"></i> ${s.typeName}</span>
          <span style="font-size: 11px; color: var(--muted);">${s.date}</span>
        </div>
        <p style="color: var(--muted); font-size: 12px; margin-bottom: 6px;">${s.notes}</p>
        <div style="display: flex; gap: 12px; font-size: 11px; color: var(--muted);">
          <span><i class="fa-solid fa-location-dot"></i> ${s.garage}</span>
          <span><i class="fa-solid fa-gauge"></i> ${s.mileage}</span>
        </div>
      </div>
      <div style="text-align: right; margin-left: 16px;">
        <div style="font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px;">${s.cost}</div>
        <div style="font-size: 11px; color: ${s.status === 'completed' ? '#4ade80' : '#60a5fa'}; margin-bottom: 8px;">${s.status === 'completed' ? 'Completed' : 'In Progress'}</div>
        <button class="btn btn-icon btn-danger btn-sm" onclick="confirmDelete('${s.typeName}', () => deleteService('${vehicleId}', ${idx}))"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>
  `).join('');
  
  if (!v.services.length) servicesHTML = '<div style="text-align: center; padding: 30px; color: var(--muted);"><i class="fa-solid fa-wrench" style="font-size: 32px; margin-bottom: 12px; display: block;"></i><p>No services recorded</p></div>';

  document.getElementById('vehicle-detail-content').innerHTML = `
    <!-- Header with back button -->
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="btn btn-icon btn-ghost" onclick="navigate('vehicles.html')" style="width: 40px; height: 40px;"><i class="fa-solid fa-chevron-left"></i></button>
        <div>
          <h1 style="font-size: 24px; font-weight: 700; color: #fff; margin: 0;">${v.name}</h1>
          <span class="status-badge ${statusClass}" style="font-size: 11px; margin-top: 4px; display: inline-block;">${v.status === 'active' ? 'Active' : v.status === 'in-service' ? 'In Service' : 'Off Road'}</span>
        </div>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn btn-primary btn-sm" onclick="window.location.href='log-service.html'"><i class="fa-solid fa-plus"></i> Log Service</button>
        <button class="btn btn-icon btn-ghost btn-sm"><i class="fa-solid fa-pen"></i></button>
        <button class="btn btn-icon btn-danger btn-sm" onclick="confirmDelete('${v.name}', () => deleteVehicle('${vehicleId}'))"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>

    <!-- Registration Plate -->
    <div style="margin-bottom: 24px;">
      <div class="reg-plate" style="font-size: 18px; padding: 10px 16px; display: inline-flex; align-items: center; gap: 8px;">
        <span class="uk-flag" style="font-size: 10px; padding: 4px 6px;">UK</span>
        <span>${v.reg}</span>
      </div>
    </div>

    <!-- Vehicle Details Grid with Icons -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 16px; margin-bottom: 24px;">
      <div style="text-align: center; padding: 16px; background: rgba(255,255,255,.04); border-radius: 12px; border: 1px solid var(--line);">
        <div style="font-size: 20px; color: var(--orange); margin-bottom: 8px;"><i class="fa-solid fa-calendar"></i></div>
        <div style="font-size: 16px; font-weight: 700; color: #fff;">${v.year}</div>
        <div style="font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px;">Year</div>
      </div>
      <div style="text-align: center; padding: 16px; background: rgba(255,255,255,.04); border-radius: 12px; border: 1px solid var(--line);">
        <div style="font-size: 20px; color: var(--orange); margin-bottom: 8px;"><i class="fa-solid fa-droplet"></i></div>
        <div style="font-size: 16px; font-weight: 700; color: #fff;">${v.fuel}</div>
        <div style="font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px;">Fuel</div>
      </div>
      <div style="text-align: center; padding: 16px; background: rgba(255,255,255,.04); border-radius: 12px; border: 1px solid var(--line);">
        <div style="font-size: 20px; color: var(--orange); margin-bottom: 8px;"><i class="fa-solid fa-gauge"></i></div>
        <div style="font-size: 16px; font-weight: 700; color: #fff;">${v.mileage}</div>
        <div style="font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px;">Mileage</div>
      </div>
      <div style="text-align: center; padding: 16px; background: rgba(255,255,255,.04); border-radius: 12px; border: 1px solid var(--line);">
        <div style="font-size: 20px; color: var(--orange); margin-bottom: 8px;"><i class="fa-solid fa-wrench"></i></div>
        <div style="font-size: 16px; font-weight: 700; color: #fff;">${v.nextService}</div>
        <div style="font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px;">Next Service</div>
      </div>
      <div style="text-align: center; padding: 16px; background: rgba(255,255,255,.04); border-radius: 12px; border: 1px solid var(--line);">
        <div style="font-size: 20px; color: var(--orange); margin-bottom: 8px;"><i class="fa-solid fa-clipboard-check"></i></div>
        <div style="font-size: 16px; font-weight: 700; color: #fff;">${v.nextMOT}</div>
        <div style="font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px;">Next MOT</div>
      </div>
      <div style="text-align: center; padding: 16px; background: rgba(255,255,255,.04); border-radius: 12px; border: 1px solid var(--line);">
        <div style="font-size: 20px; color: var(--orange); margin-bottom: 8px;"><i class="fa-solid fa-shield"></i></div>
        <div style="font-size: 16px; font-weight: 700; color: #fff;">${v.insurance}</div>
        <div style="font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px;">Insurance</div>
      </div>
    </div>

    <!-- Notes -->
    ${v.notes ? `
    <div style="background: rgba(247, 121, 31, .08); border: 1px solid rgba(247, 121, 31, .2); border-radius: 12px; padding: 16px; margin-bottom: 24px;">
      <h4 style="color: #fff; margin: 0 0 8px 0; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-note-sticky" style="color: var(--orange);"></i> Notes</h4>
      <p style="color: var(--muted); margin: 0; font-size: 13px;">${v.notes}</p>
    </div>
    ` : ''}

    <!-- Summary Stats -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div style="text-align: center; padding: 20px; background: rgba(255,255,255,.04); border-radius: 12px; border: 1px solid var(--line);">
        <div style="font-size: 28px; font-weight: 700; color: #fff;">${v.services.length}</div>
        <div style="font-size: 12px; color: var(--muted); margin-top: 4px;">Total Services</div>
      </div>
      <div style="text-align: center; padding: 20px; background: rgba(255,255,255,.04); border-radius: 12px; border: 1px solid var(--line);">
        <div style="font-size: 28px; font-weight: 700; color: #fff;">£${totalCost}</div>
        <div style="font-size: 12px; color: var(--muted); margin-top: 4px;">Total Spend</div>
      </div>
    </div>

    <!-- Service History -->
    <div class="card">
      <div class="card-header">
        <h3><i class="fa-solid fa-wrench"></i> Service History</h3>
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='log-service.html'"><i class="fa-solid fa-plus"></i> Add record</button>
      </div>
      ${servicesHTML}
    </div>
  `;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service History - VCH Fleet Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body onload="checkAuth()">

<div class="app-container">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23f7791f' width='100' height='100'/%3E%3Ctext x='50' y='60' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EVH%3C/text%3E%3C/svg%3E" alt="VCH">
      <div class="sidebar-brand-text">
        <strong>VCH Fleet</strong>
        <small>Tracker</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard.html')">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </div>
      <div class="nav-item" id="nav-vehicles" onclick="navigate('vehicles.html')">
        <i class="fa-solid fa-car"></i> Vehicles
      </div>
      <div class="nav-item active" id="nav-services" onclick="navigate('services.html')">
        <i class="fa-solid fa-wrench"></i> Service History
      </div>
      <div class="nav-item" id="nav-mileage" onclick="navigate('mileage.html')">
        <i class="fa-solid fa-gauge"></i> Driver Mileage
      </div>
      <div class="nav-divider"></div>
      <div class="nav-item add-vehicle" id="nav-add-vehicle" onclick="navigate('add-vehicle.html')">
        <i class="fa-solid fa-plus"></i> Add Vehicle
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sign-out-btn" onclick="signOut()">
        <i class="fa-solid fa-sign-out-alt"></i> Sign Out
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="page">
      <div class="page-header-row">
        <div class="page-header">
          <h1>Service History</h1>
          <p>All recorded services and maintenance</p>
        </div>
        <button class="btn btn-primary" onclick="window.location.href='log-service.html'">
          <i class="fa-solid fa-plus"></i> Log Service
        </button>
      </div>

      <!-- Filters -->
      <div class="filter-bar" style="display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;">
        <div class="search-box" style="flex: 1; min-width: 200px; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 0 12px;">
          <i class="fa-solid fa-magnifying-glass" style="color: var(--muted);"></i>
          <input type="text" id="service-search" placeholder="Search services..." style="flex: 1; background: none; border: none; outline: none; color: #fff; padding: 12px 0;" oninput="filterServices()">
        </div>
        <select id="service-vehicle-filter" class="filter-select" style="background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 12px; color: #fff; cursor: pointer;" onchange="filterServices()">
          <option value="">All Vehicles</option>
        </select>
        <select id="service-type-filter" class="filter-select" style="background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 12px; color: #fff; cursor: pointer;" onchange="filterServices()">
          <option value="">All Types</option>
          <option value="oil">Oil Change</option>
          <option value="full">Full Service</option>
          <option value="mot">MOT</option>
          <option value="battery">Battery Check</option>
          <option value="brake">Brake Service</option>
          <option value="diag">Diagnostic</option>
          <option value="other">Other</option>
        </select>
      </div>

      <!-- Services List -->
      <div id="services-list"></div>
    </div>
  </main>
</div>

<!-- ===== DELETE CONFIRM MODAL ===== -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3><i class="fa-solid fa-trash" style="color:#f87171;margin-right:8px"></i> Delete Service</h3>
    <p id="delete-modal-text">Are you sure you want to delete this service record? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger btn-sm" id="delete-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check toast-icon"></i>
  <span id="toast-text">Action completed</span>
</div>

<script src="assets/app.js"></script>
<script>
function renderServices() {
  const list = document.getElementById('services-list');
  const vehicles = Object.values(VEHICLES);
  const allServices = [];
  
  vehicles.forEach(v => {
    v.services.forEach((s, idx) => {
      allServices.push({ ...s, vehicleId: v.id, vehicleName: v.name, vehicleReg: v.reg, serviceIndex: idx });
    });
  });

  // Populate vehicle filter
  const vehicleFilter = document.getElementById('service-vehicle-filter');
  const vehicleOptions = vehicles.map(v => `<option value="${v.id}">${v.reg} — ${v.name}</option>`).join('');
  vehicleFilter.innerHTML = '<option value="">All Vehicles</option>' + vehicleOptions;

  list.innerHTML = allServices.reverse().map((s, idx) => `
    <div class="card" style="margin-bottom: 16px;" data-vehicle="${s.vehicleId}" data-type="${s.type}">
      <div style="display: flex; justify-content: space-between; align-items: start;">
        <div style="flex: 1;">
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
            <span class="type-badge ${s.type}"><i class="fa-solid ${TYPE_ICONS[s.type] || 'fa-wrench'}"></i> ${s.typeName}</span>
            <span style="font-size: 12px; color: var(--muted);">${s.date}</span>
          </div>
          <div style="margin-bottom: 8px;">
            <strong style="color: #fff;">${s.vehicleReg} — ${s.vehicleName}</strong>
          </div>
          <p style="color: var(--muted); font-size: 13px; margin-bottom: 8px;">${s.notes}</p>
          <div style="display: flex; gap: 16px; font-size: 12px; color: var(--muted);">
            <span><i class="fa-solid fa-location-dot"></i> ${s.garage}</span>
            <span><i class="fa-solid fa-gauge"></i> ${s.mileage}</span>
          </div>
        </div>
        <div style="text-align: right;">
          <div style="font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px;">${s.cost}</div>
          <div style="font-size: 12px; color: ${s.status === 'completed' ? '#4ade80' : '#60a5fa'}; margin-bottom: 12px;">${s.status === 'completed' ? 'Completed' : 'In Progress'}</div>
          <button class="btn btn-danger btn-sm" onclick="confirmDelete('${s.typeName}', () => deleteService('${s.vehicleId}', ${s.serviceIndex}))"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
    </div>
  `).join('') || '<div style="text-align: center; padding: 40px; color: var(--muted);"><i class="fa-solid fa-wrench" style="font-size: 48px; margin-bottom: 16px; display: block;"></i><p>No services recorded yet</p></div>';
}

renderServices();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service History | VCH Fleet Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .service-list { display: flex; flex-direction: column; gap: 16px; width: 100%; }
        .service-item {
            background: rgba(22,22,27,.8); border: 1px solid var(--line); border-radius: 16px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .service-item:hover { border-color: var(--orange); }
        .service-info { text-align: left; }
        .service-info h4 { font-size: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .service-info p { color: var(--muted); font-size: 13px; }
        .service-meta { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: var(--muted); }
        .service-price { font-size: 18px; font-weight: 700; color: var(--orange-2); }
        
        .type-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .type-oil { background: rgba(234,179,8,.12); color: #fbbf24; }
        .type-full { background: rgba(59,130,246,.12); color: #60a5fa; }
        
        .form-card { max-width: 600px; margin: 0 auto; text-align: left; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 8px; color: #ccc; }
        .form-group select, .form-group input, .form-group textarea {
            width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--line);
            border-radius: 12px; padding: 12px; color: #fff; outline: none;
        }
    </style>
</head>
<body>
    <div class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></div>
    <div class="sidebar-overlay" onclick="closeSidebar()"></div>
    
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-car-side" style="font-size: 24px; color: var(--orange);"></i>
                <div class="sidebar-brand-text">
                    <strong>VCH FLEET</strong>
                    <small>TRACKER</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="vehicles.html" class="nav-item"><i class="fa-solid fa-car"></i> Vehicles</a>
                <a href="service.html" class="nav-item active"><i class="fa-solid fa-wrench"></i> Service History</a>
                <a href="miles.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Driver Mileage</a>
            </nav>
            <div style="padding: 16px;">
                <button class="nav-item" style="width: 100%; border: none; background: none; cursor: pointer;" onclick="signOut()">
                    <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div id="view-list" class="centered-content">
                <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px;">
                    <div style="text-align: left;">
                        <h1 style="font-size: 28px;">Service History</h1>
                        <p style="color: var(--muted);">Maintenance records for all fleet vehicles</p>
                    </div>
                    <button class="btn btn-primary" onclick="showLogForm()">
                        <i class="fa-solid fa-plus"></i> Log Service
                    </button>
                </div>

                <div id="services-container" class="service-list">
                    <!-- Services will be injected here -->
                </div>
            </div>

            <div id="view-form" class="centered-content" style="display: none;">
                <div style="width: 100%; text-align: left; margin-bottom: 32px;">
                    <button class="btn btn-ghost btn-sm" onclick="showList()"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    <h1 style="font-size: 28px; margin-top: 16px;">Log New Service</h1>
                </div>

                <div class="card form-card">
                    <div class="form-group">
                        <label>Vehicle *</label>
                        <select id="service-vehicle-select">
                            <!-- Vehicles will be injected here -->
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group">
                            <label>Service Type *</label>
                            <select id="service-type">
                                <option value="oil">Oil Change</option>
                                <option value="full">Full Service</option>
                                <option value="mot">MOT</option>
                                <option value="brake">Brakes</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" id="service-date">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group">
                            <label>Cost (£)</label>
                            <input type="number" id="service-cost" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>Mileage at Service</label>
                            <input type="number" id="service-mileage" placeholder="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Garage / Location</label>
                        <input type="text" id="service-garage" placeholder="e.g. Auto Surgeon">
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="service-notes" rows="3"></textarea>
                    </div>
                    <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px;">
                        <button class="btn btn-ghost" onclick="showList()">Cancel</button>
                        <button class="btn btn-primary" onclick="saveService()">Save Record</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 class="modal-title">Delete Record?</h3>
            <p id="delete-modal-text" class="modal-text"></p>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal('delete-modal')">Cancel</button>
                <button class="btn btn-danger" onclick="executeDelete()">Delete</button>
            </div>
        </div>
    </div>
    <div id="toast" class="toast">
        <i class="toast-icon"></i>
        <span id="toast-text"></span>
    </div>

    <script src="assets/js/utils.js"></script>
    <script>
        checkAuth();
        let vehicles = DataStore.get('vehicles');

        function renderServices() {
            const container = document.getElementById('services-container');
            container.innerHTML = '';
            
            let allServices = [];
            Object.values(vehicles).forEach(v => {
                v.services.forEach(s => {
                    allServices.push({ ...s, vehicleName: v.name, vehicleReg: v.reg, vehicleId: v.id });
                });
            });

            allServices.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (allServices.length === 0) {
                container.innerHTML = '<div class="card" style="color: var(--muted);">No service records found.</div>';
                return;
            }

            allServices.forEach(s => {
                const item = document.createElement('div');
                item.className = 'service-item';
                item.innerHTML = `
                    <div class="service-info">
                        <h4>
                            <span class="type-badge type-${s.type}">${s.typeName}</span>
                            ${s.vehicleReg} (${s.vehicleName})
                        </h4>
                        <p>${s.notes || 'No notes provided'}</p>
                        <div class="service-meta">
                            <span><i class="fa-solid fa-calendar"></i> ${s.date}</span>
                            <span><i class="fa-solid fa-location-dot"></i> ${s.garage}</span>
                            <span><i class="fa-solid fa-gauge"></i> ${s.mileage.toLocaleString()} mi</span>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 24px;">
                        <div class="service-price">£${s.cost}</div>
                        <button class="btn btn-danger btn-sm" onclick="handleDelete('${s.vehicleId}', ${s.id}, '${s.typeName}')">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function showLogForm() {
            const select = document.getElementById('service-vehicle-select');
            select.innerHTML = '<option value="">Select Vehicle...</option>';
            Object.values(vehicles).forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.id;
                opt.textContent = `${v.reg} (${v.name})`; // Requested format: Reg(Make and model)
                select.appendChild(opt);
            });

            document.getElementById('view-list').style.display = 'none';
            document.getElementById('view-form').style.display = 'flex';
            document.getElementById('service-date').valueAsDate = new Date();
        }

        function showList() {
            document.getElementById('view-list').style.display = 'flex';
            document.getElementById('view-form').style.display = 'none';
            renderServices();
        }

        function saveService() {
            const vId = document.getElementById('service-vehicle-select').value;
            const type = document.getElementById('service-type').value;
            const date = document.getElementById('service-date').value;
            const cost = document.getElementById('service-cost').value;
            const mileage = document.getElementById('service-mileage').value;
            
            if (!vId || !date) return showToast('Please select vehicle and date', 'error');
            
            const newService = {
                id: Date.now(),
                type,
                typeName: document.getElementById('service-type').options[document.getElementById('service-type').selectedIndex].text,
                date,
                cost: parseFloat(cost || 0),
                mileage: parseInt(mileage || 0),
                garage: document.getElementById('service-garage').value,
                notes: document.getElementById('service-notes').value,
                status: 'completed'
            };

            vehicles[vId].services.push(newService);
            // Update vehicle mileage if service mileage is higher
            if (newService.mileage > vehicles[vId].mileage) {
                vehicles[vId].mileage = newService.mileage;
            }

            DataStore.set('vehicles', vehicles);
            showToast('Service record saved!');
            showList();
        }

        function handleDelete(vId, sId, typeName) {
            confirmDelete(`Are you sure you want to delete this ${typeName} record?`, () => {
                vehicles[vId].services = vehicles[vId].services.filter(s => s.id !== sId);
                DataStore.set('vehicles', vehicles);
                showToast('Record deleted');
                renderServices();
            });
        }

        renderServices();
    </script>
</body>
</html>

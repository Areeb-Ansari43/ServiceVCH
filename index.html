<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCH Fleet Tracker - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f1419;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 550px;
      padding: 40px 24px;
      text-align: center;
    }

    .login-header {
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #f7791f 0%, #ff9a3d 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
      color: white;
      box-shadow: 0 10px 30px rgba(247, 121, 31, 0.3);
    }

    .login-header h1 {
      font-size: 32px;
      font-weight: 700;
      color: white;
      margin: 0 0 8px 0;
    }

    .login-header p {
      color: #8b92a0;
      font-size: 14px;
      margin: 0;
    }

    .login-card {
      background: rgba(20, 25, 35, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #8b92a0;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .form-group input::placeholder {
      color: #5a6170;
    }

    .form-group input:focus {
      outline: none;
      border-color: #f7791f;
      background: rgba(247, 121, 31, 0.05);
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .forgot-password {
      color: #f7791f;
      text-decoration: none;
      cursor: pointer;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f7791f 0%, #ff9a3d 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(247, 121, 31, 0.3);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(247, 121, 31, 0.4);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #5a6170;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider span {
      margin: 0 12px;
    }

    .google-btn {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
      margin-bottom: 24px;
    }

    .google-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .signup-link {
      color: #8b92a0;
      font-size: 13px;
    }

    .signup-link a {
      color: #f7791f;
      text-decoration: none;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .footer-section {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(15, 20, 25, 0.95), transparent);
      padding: 40px 24px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .footer-icons {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .footer-icon-item {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .footer-icon-item i {
      font-size: 20px;
      color: #f7791f;
    }

    .footer-icon-item p {
      color: #8b92a0;
      margin: 0;
      font-size: 11px;
    }

    .footer-branding {
      color: #8b92a0;
    }

    .footer-branding a {
      color: #f7791f;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-branding a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .login-container {
        padding: 20px 16px 120px;
      }

      .footer-section {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .footer-icons {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<div class="login-container">
  <!-- Header -->
  <div class="login-header">
    <div class="logo-icon"><i class="fa-solid fa-arrow-right"></i></div>
    <h1>Welcome back</h1>
    <p>Log in to your account</p>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <!-- Google Login -->
    <button class="google-btn" onclick="alert('Google login coming soon!')">
      <i class="fa-brands fa-google"></i> Continue with Google
    </button>

    <!-- Divider -->
    <div class="divider"><span>OR</span></div>

    <!-- Login Form -->
    <form onsubmit="handleLogin(event)">
      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>

      <!-- Forgot Password -->
      <div class="form-row">
        <span></span>
        <a href="#" class="forgot-password">Forgot password?</a>
      </div>

      <!-- Login Button -->
      <button type="submit" class="login-btn">Log in</button>
    </form>
  </div>

  <!-- Signup Link -->
  <div class="signup-link">
    Don't have an account? <a href="https://virtualcarhire.pages.dev/" target="_blank">Create one</a>
  </div>
</div>

<!-- Footer -->
<div class="footer-section">
  <div class="footer-icons">
    <div class="footer-icon-item">
      <i class="fa-solid fa-car"></i>
      <p>Fleet Management</p>
    </div>
    <div class="footer-icon-item">
      <i class="fa-solid fa-wrench"></i>
      <p>Service Tracking</p>
    </div>
    <div class="footer-icon-item">
      <i class="fa-solid fa-gauge"></i>
      <p>Mileage Logs</p>
    </div>
  </div>
  <div class="footer-branding">
    Powered by <a href="https://virtualcarhire.pages.dev/" target="_blank">Virtual Car Hire</a>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check toast-icon"></i>
  <span id="toast-text">Action completed</span>
</div>

<script src="assets/app.js"></script>
<script>
function handleLogin(event) {
  event.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  
  // Demo credentials
  if (email === 'AAnsari100@outlook.com' && password === 'MFvpfkqH9kZckqj') {
    localStorage.setItem('vch-user', JSON.stringify({ email, loggedIn: true }));
    window.location.href = 'dashboard.html';
  } else {
    showToast('Invalid credentials. Please try again.', 'error');
  }
}

// Check if already logged in
if (localStorage.getItem('vch-user')) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>

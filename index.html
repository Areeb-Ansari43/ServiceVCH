<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCH Fleet Tracker - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="screen-login" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); position: relative; overflow: hidden;">
  <div class="login-glow"></div>
  <div class="login-glow b"></div>
  
  <div class="login-card" style="background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 48px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); position: relative; z-index: 10;">
    
    <!-- Logo -->
    <div class="login-logo" style="text-align: center; margin-bottom: 32px;">
      <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #f7791f 0%, #ff9a3d 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: 0 10px 30px rgba(247, 121, 31, 0.3);">
        <span style="font-size: 40px; font-weight: 700; color: white;">VH</span>
      </div>
      <h1 style="font-size: 28px; font-weight: 700; color: white; margin: 0 0 8px 0;">VCH Fleet</h1>
      <p style="color: var(--muted); font-size: 14px; margin: 0;">Fleet Management System</p>
    </div>

    <!-- Form -->
    <form onsubmit="handleLogin(event)" style="display: flex; flex-direction: column; gap: 16px;">
      
      <!-- Email Input -->
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase;">Email Address</label>
        <div style="display: flex; align-items: center; gap: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 16px;">
          <i class="fa-solid fa-envelope" style="color: var(--orange); font-size: 16px;"></i>
          <input type="email" id="login-email" placeholder="your@email.com" style="flex: 1; background: none; border: none; outline: none; color: white; font-size: 14px;" required>
        </div>
      </div>

      <!-- Password Input -->
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase;">Password</label>
        <div style="display: flex; align-items: center; gap: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 16px;">
          <i class="fa-solid fa-lock" style="color: var(--orange); font-size: 16px;"></i>
          <input type="password" id="login-password" placeholder="••••••••" style="flex: 1; background: none; border: none; outline: none; color: white; font-size: 14px;" required>
        </div>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 8px; font-size: 14px; font-weight: 600;">
        <i class="fa-solid fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <!-- Demo Credentials -->
    <div style="background: rgba(247, 121, 31, 0.1); border: 1px solid rgba(247, 121, 31, 0.2); border-radius: 12px; padding: 16px; margin-top: 24px;">
      <p style="font-size: 12px; color: var(--muted); margin: 0 0 8px 0;"><strong>Demo Credentials:</strong></p>
      <p style="font-size: 12px; color: #fff; margin: 4px 0;"><strong>Email:</strong> AAnsari100@outlook.com</p>
      <p style="font-size: 12px; color: #fff; margin: 4px 0;"><strong>Password:</strong> MFvpfkqH9kZckqj</p>
    </div>
  </div>

  <!-- Footer Icons -->
  <div style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 24px; align-items: center; z-index: 20;">
    <div style="text-align: center;">
      <div style="font-size: 24px; color: var(--orange); margin-bottom: 4px;"><i class="fa-solid fa-car"></i></div>
      <p style="font-size: 11px; color: var(--muted); margin: 0;">Fleet Management</p>
    </div>
    <div style="text-align: center;">
      <div style="font-size: 24px; color: var(--orange); margin-bottom: 4px;"><i class="fa-solid fa-wrench"></i></div>
      <p style="font-size: 11px; color: var(--muted); margin: 0;">Service Tracking</p>
    </div>
    <div style="text-align: center;">
      <div style="font-size: 24px; color: var(--orange); margin-bottom: 4px;"><i class="fa-solid fa-gauge"></i></div>
      <p style="font-size: 11px; color: var(--muted); margin: 0;">Mileage Logs</p>
    </div>
  </div>

  <!-- Powered By -->
  <div style="position: fixed; bottom: 24px; right: 24px; font-size: 11px; color: var(--muted); z-index: 20;">
    Powered by <strong>Virtual Car Hire</strong>
  </div>
</div>

<!-- ===== DASHBOARD SCREEN ===== -->
<div id="screen-dashboard" style="display: none;">
  <!-- This will be loaded dynamically -->
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check toast-icon"></i>
  <span id="toast-text">Action completed</span>
</div>

<script src="assets/app.js"></script>
<script>
function handleLogin(event) {
  event.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  
  // Demo credentials
  if (email === 'AAnsari100@outlook.com' && password === 'MFvpfkqH9kZckqj') {
    localStorage.setItem('vch-user', JSON.stringify({ email, loggedIn: true }));
    window.location.href = 'dashboard.html';
  } else {
    showToast('Invalid credentials. Please try again.', 'error');
  }
}

// Check if already logged in
if (localStorage.getItem('vch-user')) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>

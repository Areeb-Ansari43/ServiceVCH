<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VCH Fleet Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg,#0a0a0c 0%,#16161b 50%,#0f0f12 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(22,22,27,.95);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 40px 100px -30px rgba(0,0,0,.7);
            backdrop-filter: blur(20px);
            text-align: center;
        }
        .login-logo { margin-bottom: 24px; }
        .login-logo i { font-size: 40px; color: var(--orange); }
        .login-title h2 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 8px; }
        .login-title p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
        .form-group { text-align: left; margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #ccc; margin-bottom: 8px; }
        .form-group input {
            width: 100%; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
            border-radius: 12px; padding: 14px; color: #fff; outline: none; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(247,121,31,.15); }
        .login-btn { width: 100%; margin-top: 12px; }
        .login-error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }
        
        /* Feature Icons at bottom */
        .feature-icons {
            display: flex; justify-content: center; gap: 24px; margin-top: 40px; padding-top: 24px;
            border-top: 1px solid var(--line);
        }
        .feature-item { color: var(--muted); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .feature-item i { font-size: 18px; color: var(--orange-2); opacity: 0.8; }
        .login-footer { margin-top: 24px; font-size: 11px; color: var(--muted); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fa-solid fa-car-side"></i>
        </div>
        <div class="login-title">
            <h2>VCH Fleet Tracker</h2>
            <p>Premium Fleet Management System</p>
        </div>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="email@vch.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        
        <button class="btn btn-primary login-btn" onclick="handleLogin()">Sign In</button>
        <div id="login-error" class="login-error">Invalid email or password</div>

        <div class="feature-icons">
            <div class="feature-item"><i class="fa-solid fa-car"></i><span>Fleet</span></div>
            <div class="feature-item"><i class="fa-solid fa-wrench"></i><span>Service</span></div>
            <div class="feature-item"><i class="fa-solid fa-gauge-high"></i><span>Mileage</span></div>
            <div class="feature-item"><i class="fa-solid fa-shield-halved"></i><span>Secure</span></div>
        </div>

        <div class="login-footer">
            Powered by <strong>Virtual Car Hire</strong>
        </div>
    </div>

    <script src="assets/js/utils.js"></script>
    <script>
        checkAuth();
        const CREDENTIALS = {
            'AAnsari100@outlook.com': 'MFvpfkqH9kZckqj',
            'admin@virtualcarhire.com': 'fleet2024',
            'fleet@vch.com': 'fleet2024'
        };

        function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-password').value;
            const err = document.getElementById('login-error');
            
            if (CREDENTIALS[email] && CREDENTIALS[email] === pass) {
                DataStore.set('user', { email });
                window.location.href = 'vehicles.html';
            } else {
                err.style.display = 'block';
            }
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
        });
    </script>
</body>
</html>

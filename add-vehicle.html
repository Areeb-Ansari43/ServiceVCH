<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Vehicle - VCH Fleet Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body onload="checkAuth()">

<div class="app-container">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23f7791f' width='100' height='100'/%3E%3Ctext x='50' y='60' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EVH%3C/text%3E%3C/svg%3E" alt="VCH">
      <div class="sidebar-brand-text">
        <strong>VCH Fleet</strong>
        <small>Tracker</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard.html')">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </div>
      <div class="nav-item" id="nav-vehicles" onclick="navigate('vehicles.html')">
        <i class="fa-solid fa-car"></i> Vehicles
      </div>
      <div class="nav-item" id="nav-services" onclick="navigate('services.html')">
        <i class="fa-solid fa-wrench"></i> Service History
      </div>
      <div class="nav-item" id="nav-mileage" onclick="navigate('mileage.html')">
        <i class="fa-solid fa-gauge"></i> Driver Mileage
      </div>
      <div class="nav-divider"></div>
      <div class="nav-item add-vehicle active" id="nav-add-vehicle" onclick="navigate('add-vehicle.html')">
        <i class="fa-solid fa-plus"></i> Add Vehicle
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sign-out-btn" onclick="signOut()">
        <i class="fa-solid fa-sign-out-alt"></i> Sign Out
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="page">
      <div class="back-btn" onclick="navigate('vehicles.html')"><i class="fa-solid fa-chevron-left"></i> Back to vehicles</div>
      <div class="page-header">
        <h1>Add Vehicle</h1>
        <p>Add a new vehicle to your fleet</p>
      </div>

      <div class="form-card">
        <div class="form-section-title"><i class="fa-solid fa-car"></i> Vehicle Details</div>
        
        <div class="form-field">
          <label>Registration *</label>
          <div class="lookup-row">
            <input type="text" id="new-reg" placeholder="AB12 CDE" style="text-transform:uppercase">
            <button class="lookup-btn" onclick="lookupReg()"><i class="fa-solid fa-magnifying-glass"></i> Look up</button>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>Make *</label>
            <input type="text" id="new-make" placeholder="Toyota">
          </div>
          <div class="form-field">
            <label>Model *</label>
            <input type="text" id="new-model" placeholder="Corolla Estate">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>Year</label>
            <input type="number" id="new-year" placeholder="2023" min="1990" max="2030">
          </div>
          <div class="form-field">
            <label>Fuel Type</label>
            <select id="new-fuel">
              <option value="hybrid">Hybrid</option>
              <option value="electric">Electric</option>
              <option value="petrol">Petrol</option>
              <option value="diesel">Diesel</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>Current Mileage</label>
            <input type="number" id="new-mileage" placeholder="45000">
          </div>
          <div class="form-field">
            <label>Status</label>
            <select id="new-status">
              <option value="active">Active</option>
              <option value="in-service">In Service</option>
              <option value="off-road">Off Road</option>
              <option value="retired">Retired</option>
            </select>
          </div>
        </div>

        <div class="form-sub-title">Important Dates</div>
        <div class="form-row" style="grid-template-columns:1fr 1fr 1fr">
          <div class="form-field">
            <label>Next Service</label>
            <input type="date" id="new-next-service">
          </div>
          <div class="form-field">
            <label>Next MOT</label>
            <input type="date" id="new-next-mot">
          </div>
          <div class="form-field">
            <label>Insurance Expiry</label>
            <input type="date" id="new-insurance">
          </div>
        </div>

        <div class="form-field">
          <label>Notes</label>
          <textarea id="new-notes" placeholder="Any additional notes about this vehicle..."></textarea>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" onclick="addVehicle()"><i class="fa-solid fa-plus"></i> Add Vehicle</button>
          <button class="btn btn-ghost" onclick="navigate('vehicles.html')">Cancel</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check toast-icon"></i>
  <span id="toast-text">Action completed</span>
</div>

<script src="assets/app.js"></script>
</body>
</html>

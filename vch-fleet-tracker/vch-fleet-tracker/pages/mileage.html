<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Mileage - VCH Fleet Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="checkAuth()">

<div class="app-container">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23f7791f' width='100' height='100'/%3E%3Ctext x='50' y='60' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EVH%3C/text%3E%3C/svg%3E" alt="VCH">
      <div class="sidebar-brand-text">
        <strong>VCH Fleet</strong>
        <small>Tracker</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </div>
      <div class="nav-item" id="nav-vehicles" onclick="navigate('vehicles')">
        <i class="fa-solid fa-car"></i> Vehicles
      </div>
      <div class="nav-item" id="nav-services" onclick="navigate('services')">
        <i class="fa-solid fa-wrench"></i> Service History
      </div>
      <div class="nav-item active" id="nav-mileage" onclick="navigate('mileage')">
        <i class="fa-solid fa-gauge"></i> Driver Mileage
      </div>
      <div class="nav-divider"></div>
      <div class="nav-item add-vehicle" id="nav-add-vehicle" onclick="navigate('add-vehicle')">
        <i class="fa-solid fa-plus"></i> Add Vehicle
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sign-out-btn" onclick="signOut()">
        <i class="fa-solid fa-sign-out-alt"></i> Sign Out
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="page">
      <div class="page-header-row">
        <div class="page-header">
          <h1>Driver Mileage</h1>
          <p id="mileage-count">1 active tracking records</p>
        </div>
        <button class="btn btn-primary" onclick="window.location.href='track-mileage.html'">
          <i class="fa-solid fa-plus"></i> Track Mileage
        </button>
      </div>

      <!-- Tabs -->
      <div style="display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid var(--line); padding-bottom: 16px;">
        <button class="tab-btn active" id="tab-tracking" onclick="switchTab('tracking')" style="padding: 8px 16px; border: none; background: none; color: var(--orange-2); font-weight: 600; cursor: pointer; border-bottom: 2px solid var(--orange); font-size: 14px;">
          <i class="fa-solid fa-gauge"></i> Tracking
        </button>
        <button class="tab-btn" id="tab-logs" onclick="switchTab('logs')" style="padding: 8px 16px; border: none; background: none; color: var(--muted); font-weight: 600; cursor: pointer; font-size: 14px;">
          <i class="fa-solid fa-list"></i> Log Files
        </button>
      </div>

      <!-- Tracking Tab -->
      <div id="tracking-content">
        <div id="mileage-list"></div>
      </div>

      <!-- Log Files Tab -->
      <div id="logs-content" style="display: none;">
        <div id="logs-list"></div>
      </div>
    </div>
  </main>
</div>

<!-- ===== DELETE CONFIRM MODAL ===== -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3><i class="fa-solid fa-trash" style="color:#f87171;margin-right:8px"></i> Delete Mileage Log</h3>
    <p id="delete-modal-text">Are you sure you want to delete this mileage tracking? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger btn-sm" id="delete-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check toast-icon"></i>
  <span id="toast-text">Action completed</span>
</div>

<script src="../js/app.js"></script>
<script>
function switchTab(tab) {
  document.getElementById('tracking-content').style.display = tab === 'tracking' ? 'block' : 'none';
  document.getElementById('logs-content').style.display = tab === 'logs' ? 'block' : 'none';
  
  document.getElementById('tab-tracking').style.color = tab === 'tracking' ? 'var(--orange-2)' : 'var(--muted)';
  document.getElementById('tab-tracking').style.borderBottom = tab === 'tracking' ? '2px solid var(--orange)' : 'none';
  
  document.getElementById('tab-logs').style.color = tab === 'logs' ? 'var(--orange-2)' : 'var(--muted)';
  document.getElementById('tab-logs').style.borderBottom = tab === 'logs' ? '2px solid var(--orange)' : 'none';
  
  if (tab === 'logs') renderLogs();
}

function renderMileage() {
  const list = document.getElementById('mileage-list');
  const vehicles = Object.values(VEHICLES);
  
  if (MILEAGE_LOGS.length === 0) {
    list.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--muted);"><i class="fa-solid fa-gauge" style="font-size: 48px; margin-bottom: 16px; display: block;"></i><p>No mileage tracking active</p></div>';
    return;
  }

  list.innerHTML = MILEAGE_LOGS.map(log => {
    const vehicle = vehicles.find(v => v.id === log.vehicle);
    const milesDriven = log.currentMileage - log.startMileage;
    const totalAllowance = log.allowance;
    const excessMiles = Math.max(0, milesDriven - totalAllowance);
    const excessCharge = excessMiles * log.charge;

    return `
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
          <div>
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
              <div style="width: 40px; height: 40px; border-radius: 8px; background: rgba(247, 121, 31, .15); display: flex; align-items: center; justify-content: center; color: var(--orange);"><i class="fa-solid fa-user"></i></div>
              <div>
                <div style="font-weight: 600; color: #fff;">${log.driver}</div>
                <div style="font-size: 12px; color: var(--muted);">${vehicle ? vehicle.name : 'Unknown Vehicle'}</div>
              </div>
            </div>
            <div style="display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.05); padding: 6px 12px; border-radius: 8px; margin-top: 8px;">
              <span class="uk-flag" style="background: #003399; color: #fff; font-size: 8px; font-weight: 700; padding: 2px 4px; border-radius: 2px;">UK</span>
              <span style="font-size: 13px; font-weight: 600; color: #fff;">${vehicle ? vehicle.reg : 'N/A'}</span>
            </div>
          </div>
          <button class="btn btn-icon btn-danger btn-sm" onclick="confirmDelete('Mileage tracking for ${log.driver}', () => deleteMileageLog('${log.id}'))"><i class="fa-solid fa-trash"></i></button>
        </div>

        <div style="background: rgba(255,255,255,.04); border-radius: 12px; padding: 16px; margin-bottom: 16px;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
            <div>
              <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Start Mileage</div>
              <div style="font-size: 18px; font-weight: 700; color: #fff;">${log.startMileage.toLocaleString()} mi</div>
            </div>
            <div>
              <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Current Mileage</div>
              <div style="font-size: 18px; font-weight: 700; color: #fff;">${log.currentMileage.toLocaleString()} mi</div>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; font-size: 13px;">
            <div>
              <div style="color: var(--muted); margin-bottom: 4px;">Miles Driven</div>
              <div style="color: #fff; font-weight: 600;">${milesDriven.toLocaleString()} mi</div>
            </div>
            <div>
              <div style="color: var(--muted); margin-bottom: 4px;">Monthly Allowance</div>
              <div style="color: #fff; font-weight: 600;">${log.allowance.toLocaleString()} mi/mo</div>
            </div>
            <div>
              <div style="color: var(--muted); margin-bottom: 4px;">Excess Miles</div>
              <div style="color: ${excessMiles > 0 ? '#f87171' : '#4ade80'}; font-weight: 600;">${excessMiles.toLocaleString()} mi</div>
            </div>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div style="font-size: 12px; color: var(--muted);">Started ${log.startDate}</div>
          <div style="display: flex; gap: 8px;">
            <button class="btn btn-primary btn-sm" onclick="logMiles('${log.id}')"><i class="fa-solid fa-gauge"></i> Log Miles</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderLogs() {
  const list = document.getElementById('logs-list');
  
  if (SERVICE_LOGS.length === 0) {
    list.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--muted);"><i class="fa-solid fa-list" style="font-size: 48px; margin-bottom: 16px; display: block;"></i><p>No mileage logs recorded yet</p></div>';
    return;
  }

  list.innerHTML = SERVICE_LOGS.reverse().map(log => {
    const mileageLog = MILEAGE_LOGS.find(m => m.id === log.logId);
    const vehicle = Object.values(VEHICLES).find(v => v.id === (mileageLog ? mileageLog.vehicle : null));

    return `
      <div class="card" style="margin-bottom: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-weight: 600; color: #fff; margin-bottom: 4px;">
              <i class="fa-solid fa-gauge" style="color: var(--orange); margin-right: 8px;"></i>
              ${log.mileage.toLocaleString()} mi
            </div>
            <div style="font-size: 12px; color: var(--muted);">
              ${vehicle ? vehicle.name : 'Unknown'} • ${log.date}
            </div>
          </div>
          <div style="text-align: right;">
            <div style="font-size: 12px; color: var(--muted);">Logged by ${mileageLog ? mileageLog.driver : 'Unknown'}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

renderMileage();
document.getElementById('mileage-count').textContent = MILEAGE_LOGS.length + ' active tracking record' + (MILEAGE_LOGS.length !== 1 ? 's' : '');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Details - VCH Fleet Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="checkAuth(); loadVehicleDetail()">

<div class="app-container">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23f7791f' width='100' height='100'/%3E%3Ctext x='50' y='60' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EVH%3C/text%3E%3C/svg%3E" alt="VCH">
      <div class="sidebar-brand-text">
        <strong>VCH Fleet</strong>
        <small>Tracker</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </div>
      <div class="nav-item active" id="nav-vehicles" onclick="navigate('vehicles')">
        <i class="fa-solid fa-car"></i> Vehicles
      </div>
      <div class="nav-item" id="nav-services" onclick="navigate('services')">
        <i class="fa-solid fa-wrench"></i> Service History
      </div>
      <div class="nav-item" id="nav-mileage" onclick="navigate('mileage')">
        <i class="fa-solid fa-gauge"></i> Driver Mileage
      </div>
      <div class="nav-divider"></div>
      <div class="nav-item add-vehicle" id="nav-add-vehicle" onclick="navigate('add-vehicle')">
        <i class="fa-solid fa-plus"></i> Add Vehicle
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sign-out-btn" onclick="signOut()">
        <i class="fa-solid fa-sign-out-alt"></i> Sign Out
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="page">
      <div class="back-btn" onclick="navigate('vehicles')"><i class="fa-solid fa-chevron-left"></i> Back to vehicles</div>
      <div id="vehicle-detail-content"></div>
    </div>
  </main>
</div>

<!-- ===== DELETE CONFIRM MODAL ===== -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3><i class="fa-solid fa-trash" style="color:#f87171;margin-right:8px"></i> Delete</h3>
    <p id="delete-modal-text">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger btn-sm" id="delete-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check toast-icon"></i>
  <span id="toast-text">Action completed</span>
</div>

<script src="../js/app.js"></script>
<script>
function loadVehicleDetail() {
  const params = new URLSearchParams(window.location.search);
  const vehicleId = params.get('id');
  const v = VEHICLES[vehicleId];
  
  if (!v) {
    document.getElementById('vehicle-detail-content').innerHTML = '<div class="empty-state"><i class="fa-solid fa-car"></i><h3>Vehicle not found</h3></div>';
    return;
  }

  const statusClass = v.status === 'active' ? 'active' : v.status === 'in-service' ? 'in-service' : 'off-road';
  const totalCost = v.services.filter(s => s.cost !== '—').reduce((a, s) => a + parseInt(s.cost.replace('£', '') || 0), 0);
  
  let servicesHTML = v.services.map((s, idx) => `
    <div class="card" style="margin-bottom: 12px;">
      <div style="display: flex; justify-content: space-between; align-items: start;">
        <div style="flex: 1;">
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
            <span class="type-badge ${s.type}"><i class="fa-solid ${TYPE_ICONS[s.type] || 'fa-wrench'}"></i> ${s.typeName}</span>
            <span style="font-size: 12px; color: var(--muted);">${s.date}</span>
          </div>
          <p style="color: var(--muted); font-size: 13px; margin-bottom: 8px;">${s.notes}</p>
          <div style="display: flex; gap: 16px; font-size: 12px; color: var(--muted);">
            <span><i class="fa-solid fa-location-dot"></i> ${s.garage}</span>
            <span><i class="fa-solid fa-gauge"></i> ${s.mileage}</span>
          </div>
        </div>
        <div style="text-align: right;">
          <div style="font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px;">${s.cost}</div>
          <div style="font-size: 12px; color: ${s.status === 'completed' ? '#4ade80' : '#60a5fa'}; margin-bottom: 12px;">${s.status === 'completed' ? 'Completed' : 'In Progress'}</div>
          <button class="btn btn-danger btn-sm" onclick="confirmDelete('${s.typeName}', () => deleteService('${vehicleId}', ${idx}))"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
    </div>
  `).join('');
  
  if (!v.services.length) servicesHTML = '<div style="text-align: center; padding: 30px; color: var(--muted);"><i class="fa-solid fa-wrench"></i><p style="margin-top: 12px;">No services recorded</p></div>';

  document.getElementById('vehicle-detail-content').innerHTML = `
    <div class="page-header">
      <h1>${v.name}</h1>
      <p>Vehicle details and service history</p>
    </div>

    <div class="card" style="margin-bottom: 20px;">
      <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px;">
        <div>
          <h2 style="font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 12px;">${v.name}</h2>
          <div style="display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.05); padding: 8px 14px; border-radius: 8px;">
            <span class="uk-flag" style="background: #003399; color: #fff; font-size: 8px; font-weight: 700; padding: 2px 4px; border-radius: 2px;">UK</span>
            <span style="font-size: 14px; font-weight: 700; color: #f7c948; font-family: 'Courier New', monospace;">${v.reg}</span>
          </div>
        </div>
        <div style="display: flex; gap: 8px;">
          <button class="btn btn-primary btn-sm" onclick="window.location.href='log-service.html'"><i class="fa-solid fa-plus"></i> Log Service</button>
          <button class="btn btn-danger btn-sm" onclick="confirmDelete('${v.name}', () => deleteVehicle('${vehicleId}'))"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
        <div>
          <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Year</div>
          <div style="font-size: 16px; font-weight: 600; color: #fff;">${v.year}</div>
        </div>
        <div>
          <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Fuel Type</div>
          <div style="font-size: 16px; font-weight: 600; color: #fff;">${v.fuel}</div>
        </div>
        <div>
          <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Mileage</div>
          <div style="font-size: 16px; font-weight: 600; color: #fff;">${v.mileage}</div>
        </div>
        <div>
          <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Status</div>
          <div><span class="status-badge ${statusClass}">${v.status === 'active' ? 'Active' : v.status === 'in-service' ? 'In Service' : 'Off Road'}</span></div>
        </div>
        <div>
          <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Next Service</div>
          <div style="font-size: 16px; font-weight: 600; color: #fff;">${v.nextService}</div>
        </div>
        <div>
          <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Next MOT</div>
          <div style="font-size: 16px; font-weight: 600; color: #fff;">${v.nextMOT}</div>
        </div>
      </div>
    </div>

    ${v.notes ? `<div class="card" style="background: rgba(247, 121, 31, .08); border-color: rgba(247, 121, 31, .2); margin-bottom: 20px;"><h4 style="color: #fff; margin-bottom: 8px;"><i class="fa-solid fa-note-sticky" style="color: var(--orange); margin-right: 8px;"></i> Notes</h4><p style="color: var(--muted);">${v.notes}</p></div>` : ''}

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
      <div class="card">
        <div style="text-align: center;">
          <div style="font-size: 28px; font-weight: 700; color: #fff;">${v.services.length}</div>
          <div style="font-size: 12px; color: var(--muted); margin-top: 4px;">Total Services</div>
        </div>
      </div>
      <div class="card">
        <div style="text-align: center;">
          <div style="font-size: 28px; font-weight: 700; color: #fff;">£${totalCost}</div>
          <div style="font-size: 12px; color: var(--muted); margin-top: 4px;">Total Spend</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3><i class="fa-solid fa-wrench"></i> Service History</h3>
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='log-service.html'"><i class="fa-solid fa-plus"></i> Add Record</button>
      </div>
      ${servicesHTML}
    </div>
  `;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Mileage - VCH Fleet Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="checkAuth()">

<div class="app-container">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23f7791f' width='100' height='100'/%3E%3Ctext x='50' y='60' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EVH%3C/text%3E%3C/svg%3E" alt="VCH">
      <div class="sidebar-brand-text">
        <strong>VCH Fleet</strong>
        <small>Tracker</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </div>
      <div class="nav-item" id="nav-vehicles" onclick="navigate('vehicles')">
        <i class="fa-solid fa-car"></i> Vehicles
      </div>
      <div class="nav-item" id="nav-services" onclick="navigate('services')">
        <i class="fa-solid fa-wrench"></i> Service History
      </div>
      <div class="nav-item active" id="nav-mileage" onclick="navigate('mileage')">
        <i class="fa-solid fa-gauge"></i> Driver Mileage
      </div>
      <div class="nav-divider"></div>
      <div class="nav-item add-vehicle" id="nav-add-vehicle" onclick="navigate('add-vehicle')">
        <i class="fa-solid fa-plus"></i> Add Vehicle
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sign-out-btn" onclick="signOut()">
        <i class="fa-solid fa-sign-out-alt"></i> Sign Out
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="page">
      <div class="back-btn" onclick="navigate('mileage')"><i class="fa-solid fa-chevron-left"></i> Back to mileage</div>
      <div class="page-header">
        <h1>Track Mileage</h1>
        <p>Set up driver mileage tracking for a vehicle</p>
      </div>

      <div class="form-card">
        <div class="form-section-title"><i class="fa-solid fa-gauge"></i> Mileage Tracking</div>
        
        <div class="form-row">
          <div class="form-field">
            <label>Driver Name *</label>
            <input type="text" id="track-driver" placeholder="e.g. Areeb">
          </div>
          <div class="form-field">
            <label>Vehicle *</label>
            <select id="track-vehicle">
              <option value="">Select vehicle...</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>Start Mileage *</label>
            <input type="number" id="track-start" placeholder="e.g. 120000">
          </div>
          <div class="form-field">
            <label>Current Mileage</label>
            <input type="number" id="track-current" placeholder="e.g. 124000">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>Monthly Allowance (mi)</label>
            <input type="number" id="track-allowance" placeholder="e.g. 5000">
          </div>
          <div class="form-field">
            <label>Excess Charge (p/mi)</label>
            <input type="number" id="track-charge" placeholder="e.g. 20" step="0.1">
          </div>
        </div>

        <div class="form-field">
          <label>Start Date</label>
          <input type="date" id="track-start-date">
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" onclick="saveMileage()"><i class="fa-solid fa-floppy-disk"></i> Save Tracking</button>
          <button class="btn btn-ghost" onclick="navigate('mileage')">Cancel</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check toast-icon"></i>
  <span id="toast-text">Action completed</span>
</div>

<script src="../js/app.js"></script>
<script>
// Populate vehicle dropdown
const vehicleSelect = document.getElementById('track-vehicle');
Object.values(VEHICLES).forEach(v => {
  const option = document.createElement('option');
  option.value = v.id;
  option.textContent = v.reg + ' — ' + v.name;
  vehicleSelect.appendChild(option);
});

// Set today's date
document.getElementById('track-start-date').valueAsDate = new Date();
</script>
</body>
</html>

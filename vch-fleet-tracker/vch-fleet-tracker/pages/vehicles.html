<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicles - VCH Fleet Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="checkAuth()">

<div class="app-container">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23f7791f' width='100' height='100'/%3E%3Ctext x='50' y='60' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EVH%3C/text%3E%3C/svg%3E" alt="VCH">
      <div class="sidebar-brand-text">
        <strong>VCH Fleet</strong>
        <small>Tracker</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </div>
      <div class="nav-item active" id="nav-vehicles" onclick="navigate('vehicles')">
        <i class="fa-solid fa-car"></i> Vehicles
      </div>
      <div class="nav-item" id="nav-services" onclick="navigate('services')">
        <i class="fa-solid fa-wrench"></i> Service History
      </div>
      <div class="nav-item" id="nav-mileage" onclick="navigate('mileage')">
        <i class="fa-solid fa-gauge"></i> Driver Mileage
      </div>
      <div class="nav-divider"></div>
      <div class="nav-item add-vehicle" id="nav-add-vehicle" onclick="navigate('add-vehicle')">
        <i class="fa-solid fa-plus"></i> Add Vehicle
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sign-out-btn" onclick="signOut()">
        <i class="fa-solid fa-sign-out-alt"></i> Sign Out
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="page">
      <div class="page-header-row">
        <div class="page-header">
          <h1>Vehicles</h1>
          <p>Manage your fleet vehicles</p>
        </div>
        <button class="btn btn-primary" onclick="navigate('add-vehicle')">
          <i class="fa-solid fa-plus"></i> Add Vehicle
        </button>
      </div>

      <!-- Filters -->
      <div class="filter-bar" style="display: flex; gap: 12px; margin-bottom: 24px;">
        <div class="search-box" style="flex: 1; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 0 12px;">
          <i class="fa-solid fa-magnifying-glass" style="color: var(--muted);"></i>
          <input type="text" id="vehicle-search" placeholder="Search by name or reg..." style="flex: 1; background: none; border: none; outline: none; color: #fff; padding: 12px 0;" oninput="filterVehicles()">
        </div>
        <select id="vehicle-status-filter" class="filter-select" style="background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 12px; color: #fff; cursor: pointer;" onchange="filterVehicles()">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="in-service">In Service</option>
          <option value="off-road">Off Road</option>
          <option value="retired">Retired</option>
        </select>
      </div>

      <!-- Vehicles Grid -->
      <div class="vehicles-grid" id="vehicles-grid"></div>
    </div>
  </main>
</div>

<!-- ===== DELETE CONFIRM MODAL ===== -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3><i class="fa-solid fa-trash" style="color:#f87171;margin-right:8px"></i> Delete Vehicle</h3>
    <p id="delete-modal-text">Are you sure you want to delete this vehicle? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger btn-sm" id="delete-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check toast-icon"></i>
  <span id="toast-text">Action completed</span>
</div>

<script src="../js/app.js"></script>
<script>
function renderVehicles() {
  const grid = document.getElementById('vehicles-grid');
  const vehicles = Object.values(VEHICLES);
  
  grid.innerHTML = vehicles.map(v => `
    <div class="vehicle-card" data-status="${v.status}">
      <div class="vehicle-card-top">
        <div class="reg-plate"><span class="uk-flag">UK</span> ${v.reg}</div>
        <div class="vehicle-card-actions">
          <button class="btn btn-icon btn-ghost btn-sm" onclick="window.location.href='vehicle-detail.html?id=${v.id}'"><i class="fa-solid fa-eye"></i></button>
          <button class="btn btn-icon btn-danger btn-sm" onclick="confirmDelete('${v.name}', () => deleteVehicle('${v.id}'))"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
      <div class="vehicle-card-name">${v.name}</div>
      <div class="vehicle-card-details">
        <div class="vehicle-detail-item"><label>Year</label><span>${v.year}</span></div>
        <div class="vehicle-detail-item"><label>Fuel</label><span>${v.fuel}</span></div>
        <div class="vehicle-detail-item"><label>Mileage</label><span>${v.mileage}</span></div>
      </div>
      <div class="vehicle-card-arrow" onclick="window.location.href='vehicle-detail.html?id=${v.id}'">
        View Details <i class="fa-solid fa-chevron-right"></i>
      </div>
    </div>
  `).join('');
}

renderVehicles();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicles | VCH Fleet Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .vehicles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .vehicle-card { 
            background: rgba(22,22,27,.8); border: 1px solid var(--line); border-radius: 16px; padding: 24px; 
            transition: 0.3s; cursor: pointer; position: relative;
        }
        .vehicle-card:hover { transform: translateY(-5px); border-color: var(--orange); }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .vehicle-info h3 { font-size: 18px; margin-bottom: 4px; }
        .vehicle-info p { color: var(--muted); font-size: 13px; }
        .status-pill { font-size: 11px; padding: 4px 10px; border-radius: 999px; font-weight: 600; text-transform: uppercase; }
        .status-active { background: rgba(34,197,94,.12); color: #4ade80; }
        .status-service { background: rgba(59,130,246,.12); color: #60a5fa; }
        .vehicle-details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; text-align: left; }
        .detail-item label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
        .detail-item span { font-size: 14px; font-weight: 500; }
        .card-actions { display: flex; gap: 8px; margin-top: 24px; }
        
        /* Add Vehicle Form */
        .form-card { max-width: 600px; margin: 0 auto; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; text-align: left; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 8px; color: #ccc; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--line);
            border-radius: 12px; padding: 12px; color: #fff; outline: none;
        }
        .lookup-row { display: flex; gap: 8px; }
        .lookup-row input { flex: 1; }
    </style>
</head>
<body>
    <div class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></div>
    <div class="sidebar-overlay" onclick="closeSidebar()"></div>
    
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-car-side" style="font-size: 24px; color: var(--orange);"></i>
                <div class="sidebar-brand-text">
                    <strong>VCH FLEET</strong>
                    <small>TRACKER</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="vehicles.html" class="nav-item active"><i class="fa-solid fa-car"></i> Vehicles</a>
                <a href="service.html" class="nav-item"><i class="fa-solid fa-wrench"></i> Service History</a>
                <a href="miles.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Driver Mileage</a>
            </nav>
            <div style="padding: 16px;">
                <button class="nav-item" style="width: 100%; border: none; background: none; cursor: pointer;" onclick="signOut()">
                    <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <!-- List View -->
            <div id="view-list" class="centered-content">
                <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px;">
                    <div style="text-align: left;">
                        <h1 style="font-size: 28px;">Fleet Vehicles</h1>
                        <p style="color: var(--muted);">Manage and track your company vehicles</p>
                    </div>
                    <button class="btn btn-primary" onclick="showAddForm()">
                        <i class="fa-solid fa-plus"></i> Add Vehicle
                    </button>
                </div>

                <div id="vehicles-container" class="vehicles-grid" style="width: 100%;">
                    <!-- Vehicles will be injected here -->
                </div>
            </div>

            <!-- Add/Edit Form -->
            <div id="view-form" class="centered-content" style="display: none;">
                <div style="width: 100%; text-align: left; margin-bottom: 32px;">
                    <button class="btn btn-ghost btn-sm" onclick="showList()"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    <h1 id="form-title" style="font-size: 28px; margin-top: 16px;">Add New Vehicle</h1>
                </div>

                <div class="card form-card">
                    <div class="form-group">
                        <label>Registration Number *</label>
                        <div class="lookup-row">
                            <input type="text" id="reg" placeholder="e.g. FX19FXC" style="text-transform: uppercase;">
                            <button class="btn btn-ghost" onclick="handleLookup()"><i class="fa-solid fa-magnifying-glass"></i> Lookup</button>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Make *</label>
                            <input type="text" id="make" placeholder="e.g. Mercedes-Benz">
                        </div>
                        <div class="form-group">
                            <label>Model *</label>
                            <input type="text" id="model" placeholder="e.g. E-Class">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Year</label>
                            <input type="number" id="year" placeholder="2024">
                        </div>
                        <div class="form-group">
                            <label>Fuel Type</label>
                            <select id="fuel">
                                <option value="Diesel">Diesel</option>
                                <option value="Petrol">Petrol</option>
                                <option value="Hybrid">Hybrid</option>
                                <option value="Electric">Electric</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Current Mileage</label>
                            <input type="number" id="mileage" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="status">
                                <option value="active">Active</option>
                                <option value="in-service">In Service</option>
                                <option value="off-road">Off Road</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="notes" rows="3"></textarea>
                    </div>
                    <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px;">
                        <button class="btn btn-ghost" onclick="showList()">Cancel</button>
                        <button class="btn btn-primary" onclick="saveVehicle()">Save Vehicle</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals & Toast -->
    <div id="delete-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 class="modal-title">Delete Vehicle?</h3>
            <p id="delete-modal-text" class="modal-text"></p>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal('delete-modal')">Cancel</button>
                <button class="btn btn-danger" onclick="executeDelete()">Delete</button>
            </div>
        </div>
    </div>
    <div id="toast" class="toast">
        <i class="toast-icon"></i>
        <span id="toast-text"></span>
    </div>

    <script src="assets/js/utils.js"></script>
    <script>
        checkAuth();
        let vehicles = DataStore.get('vehicles');

        function renderVehicles() {
            const container = document.getElementById('vehicles-container');
            container.innerHTML = '';
            
            Object.values(vehicles).forEach(v => {
                const card = document.createElement('div');
                card.className = 'vehicle-card';
                card.innerHTML = `
                    <div class="card-top">
                        <div class="reg-plate">
                            <div class="uk-side">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Flag_of_the_United_Kingdom.svg" alt="UK">
                                <span>UK</span>
                            </div>
                            <div class="reg-text">${v.reg}</div>
                        </div>
                        <span class="status-pill status-${v.status}">${v.status.replace('-',' ')}</span>
                    </div>
                    <div class="vehicle-info" style="text-align: left;">
                        <h3>${v.name}</h3>
                        <p>${v.year} • ${v.fuel}</p>
                    </div>
                    <div class="vehicle-details">
                        <div class="detail-item"><label>Mileage</label><span>${v.mileage.toLocaleString()} mi</span></div>
                        <div class="detail-item"><label>Next Service</label><span>${v.nextService || 'N/A'}</span></div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); editVehicle('${v.id}')"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); handleDelete('${v.id}', '${v.reg}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                card.onclick = () => { /* Future: Navigate to detail */ };
                container.appendChild(card);
            });
        }

        function showAddForm() {
            document.getElementById('view-list').style.display = 'none';
            document.getElementById('view-form').style.display = 'flex';
            document.getElementById('form-title').textContent = 'Add New Vehicle';
            clearForm();
        }

        function showList() {
            document.getElementById('view-list').style.display = 'flex';
            document.getElementById('view-form').style.display = 'none';
            renderVehicles();
        }

        async function handleLookup() {
            const reg = document.getElementById('reg').value.trim();
            if (!reg) return showToast('Please enter a registration', 'error');
            
            showToast('Looking up vehicle...', 'info');
            const data = await lookupVehicle(reg);
            if (data) {
                document.getElementById('make').value = data.make;
                document.getElementById('model').value = data.model;
                document.getElementById('year').value = data.year;
                document.getElementById('fuel').value = data.fuel;
                showToast('Vehicle details found!', 'success');
            } else {
                showToast('Vehicle not found. Please enter manually.', 'error');
            }
        }

        function saveVehicle() {
            const reg = document.getElementById('reg').value.trim().toUpperCase();
            const make = document.getElementById('make').value.trim();
            const model = document.getElementById('model').value.trim();
            
            if (!reg || !make || !model) return showToast('Please fill required fields', 'error');
            
            const id = reg.toLowerCase().replace(/\s/g, '-');
            vehicles[id] = {
                id,
                reg,
                name: `${make} ${model}`,
                make,
                model,
                year: document.getElementById('year').value,
                fuel: document.getElementById('fuel').value,
                mileage: parseInt(document.getElementById('mileage').value || 0),
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value,
                nextService: '',
                services: []
            };
            
            DataStore.set('vehicles', vehicles);
            showToast('Vehicle saved successfully!');
            showList();
        }

        function handleDelete(id, reg) {
            confirmDelete(`Are you sure you want to delete vehicle ${reg}?`, () => {
                delete vehicles[id];
                DataStore.set('vehicles', vehicles);
                showToast('Vehicle deleted');
                renderVehicles();
            });
        }

        function clearForm() {
            ['reg', 'make', 'model', 'year', 'mileage', 'notes'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('fuel').value = 'Diesel';
            document.getElementById('status').value = 'active';
        }

        renderVehicles();
    </script>
</body>
</html>
